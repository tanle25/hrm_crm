host: "127.0.0.1"
port: 8317

tls:
  enable: false
  cert: ""
  key: ""

auth-dir: "/root/.cli-proxy-api"

api-keys:
  - "replace-with-a-strong-api-key"

debug: false
commercial-mode: false

remote-management:
  allow-remote: false
  secret-key: ""
  disable-control-panel: false
  panel-github-repository: "https://github.com/router-for-me/Cli-Proxy-API-Management-Center"

# Provider credentials and routing are intentionally omitted here.
# Add your real upstream/account config on the VPS after first deploy.
